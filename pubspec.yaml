name: islamic_app
description: A modern, offline-first, feature-rich Islamic app with Prayer Tracker, Azan System, Qibla Finder, Quran Progress, Ramadan Tracker, and Zakat Calculator.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod: ^2.5.1

  # Local Storage & Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # Database & Backend
  supabase_flutter: ^2.6.0

  # Location & Sensors
  geolocator: ^11.0.0
  flutter_compass: ^0.4.8

  # Notifications & Work Manager
  flutter_local_notifications: ^17.1.2
  workmanager: ^0.5.2

  # Core & Utilities
  http: ^1.2.1
  intl: ^0.19.0
  timezone: ^0.9.4
  flutter_timezone: ^2.0.1
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  path_provider: ^2.1.3
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
    - assets/locales/en.json
    - assets/locales/ur.json
    - assets/locales/ar.json

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: JameelNoori
      fonts:
        - asset: assets/fonts/Jameel-Noori-Nastaleeq.ttf
